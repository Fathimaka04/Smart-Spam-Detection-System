<!DOCTYPE html>
<html>
<head>
    <title>Smart Spam Detection System</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            margin:0;
        }

        .container{
            background:white;
            padding:40px;
            border-radius:20px;
            width:500px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        h1{
            color:#333;
            margin-bottom:25px;
        }

        textarea{
            width:100%;
            height:120px;
            padding:10px;
            border-radius:10px;
            border:1px solid #ccc;
            resize:none;
            font-size:16px;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            border-radius:10px;
            background:#667eea;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#4f62d6;
        }

        .result{
            margin-top:25px;
            font-size:24px;
            font-weight:bold;
        }

        .spam{
            color:red;
        }

        .ham{
            color:green;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>📩 Smart Spam Detection System</h1>

    <form method="POST">
        {% csrf_token %}

        <textarea
            name="message"
            placeholder="Type your SMS here..."
        ></textarea>

        <br>

        <button type="submit">
            Check Message
        </button>

    </form>

    {% if result %}
        <div class="result
            {% if result == 'Spam' %}
                spam
            {% else %}
                ham
            {% endif %}
        ">
            Prediction : {{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
